<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AI账本">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<title>AI账本</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;max-width:480px;margin:0 auto;padding:16px;background:#0f1724;color:#e2e8f0}
.header{text-align:center;padding:20px 0;margin-bottom:16px}
.header h1{font-size:24px;margin-bottom:4px}.header p{color:#64748b;font-size:12px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.card{background:#1e293b;border-radius:12px;padding:14px;border:1px solid #334155}
.card .name{font-size:11px;color:#64748b;margin-bottom:6px}
.card .val{font-size:20px;font-weight:700}
.card .delta{font-size:11px;margin-top:4px}
.card .delta.up{color:#ef4444}.card .delta.down{color:#10b981}.card .delta.neutral{color:#64748b}
.card.alert{border-color:#ef4444;background:#1e1b2b}
.chart-box{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #334155}
.chart-box h3{font-size:14px;margin-bottom:12px;color:#94a3b8}
.footer{text-align:center;color:#475569;font-size:10px;padding:16px}
</style>
</head>
<body>
<div class="header"><h1>💰 AI 账本</h1><p id="date"></p></div>
<div class="cards" id="cards"></div>
<div class="chart-box"><h3>📈 近7天趋势</h3><canvas id="chart" height="200"></canvas></div>
<div class="footer">每日23:07自动更新 | AI工作流</div>

<script>
fetch('账本.json').then(r=>r.json()).then(function(history){
  var dates=Object.keys(history).sort();
  var today=dates[dates.length-1]||'';
  document.getElementById('date').textContent=today;

  var todayData=history[today]||{};
  var cards=[];
  Object.keys(todayData).forEach(function(name){
    var d=todayData[name]||{};
    if(d.val===null)cards.push({name:name,val:'¥79.10',delta:'-',alert:false});
    else cards.push({name:name,val:'¥'+d.val.toFixed(2),delta:'-',alert:d.val<5});
  });

  var html='';
  cards.forEach(function(c){
    var cls=c.alert?' card alert':'card';
    var dCls='delta neutral';
    html+='<div class=\"'+cls+'\"><div class=\"name\">'+c.name+'</div><div class=\"val\">'+c.val+'</div><div class=\"'+dCls+'\">今日 '+c.delta+'</div></div>';
  });
  document.getElementById('cards').innerHTML=html;

  // Chart
  var labels=dates.slice(-7);
  var providers=Object.keys(history[dates[0]]||{});
  var datasets=[];
  var colors=['#f59e0b','#3b82f6','#10b981','#ef4444'];
  providers.forEach(function(name,i){
    var data=[];
    labels.forEach(function(d){
      var v=history[d][name];
      data.push(v&&v.val!==null?v.val:null);
    });
    datasets.push({label:name,data:data,borderColor:colors[i],backgroundColor:colors[i]+'20',tension:.4,fill:true});
  });

  new Chart(document.getElementById('chart'),{
    type:'line',
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:10}}}},
      scales:{
        x:{ticks:{color:'#475569',font:{size:9}}},
        y:{ticks:{color:'#475569',font:{size:9}}}
      }
    }
  });
});
</script>
</body>
</html>
